<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Square with Circular Images</title>
<style>
    /* Page center karne ke liye */
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f0f0f0; /* Background light gray */
        font-family: Arial, sans-serif;
    }

    /* Main Square Box - Color Changed to Purple */
    .box {
        position: relative;
        width: 400px;
        height: 400px;
        background: #6A0DAD; /* Pehle blue tha, ab purple kar diya */
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    /* Sab circular images ke liye common style */
    .circle {
        position: absolute;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        overflow: hidden;
        border: 4px solid white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Har circle ki position + border color */
    .circle-top {
        top: -50px;
        left: 50%;
        transform: translateX(-50%);
        border-color: #FF5733; /* Orange-Red */
    }

    .circle-right {
        right: -50px;
        top: 50%;
        transform: translateY(-50%);
        border-color: #2ECC71; /* Green */
    }

    .circle-bottom {
        bottom: -50px;
        left: 50%;
        transform: translateX(-50%);
        border-color: #3498DB; /* Blue */
    }

    .circle-left {
        left: -50px;
        top: 50%;
        transform: translateY(-50%);
        border-color: #E91E63; /* Pink */
    }

    .circle-center {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 120px; /* Center wala thora bara */
        height: 120px;
        border-color: #F1C40F; /* Yellow */
    }
</style>
</head>
<body>

<div class="box">
    <div class="circle circle-top">
        <img src="https://picsum.photos/200?random=1" alt="">
    </div>
    <div class="circle circle-right">
        <img src="https://picsum.photos/200?random=2" alt="">
    </div>
    <div class="circle circle-bottom">
        <img src="https://picsum.photos/200?random=3" alt="">
    </div>
    <div class="circle circle-left">
        <img src="https://picsum.photos/200?random=4" alt="">
    </div>
    <div class="circle circle-center">
        <img src="https://picsum.photos/200?random=5" alt="">
    </div>
</div>

</body>
</html>
